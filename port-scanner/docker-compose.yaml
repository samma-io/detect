services:
  port-scanner:
    build:
      context: ..
      dockerfile: port-scanner/Dockerfile
    image: ghcr.io/samma-io/detect-port-scanner:latest
    volumes:
      - ./out:/out
    environment:
      - TARGET=scanme.nmap.org
      - PORTS=80,443,8080,8443
      - TIMEOUT=3
      - SAMMA_IO_SCANNER=port-scanner
      - SAMMA_IO_ID=1234
      - SAMMA_IO_TAGS=['scanner']
      - SAMMA_IO_JSON={}
      - WRITE_TO_FILE=true
      - PARSER=port-scanner
