services:
  tls-scanner:
    build:
      context: ..
      dockerfile: tls-scanner/Dockerfile
    image: ghcr.io/samma-io/detect-tls-scanner:latest
    volumes:
      - ./out:/out
    environment:
      - TARGET=example.com
      - PORT=443
      - TIMEOUT=5
      - VERIFY_CERT=True
      - SAMMA_IO_SCANNER=tls-scanner
      - SAMMA_IO_ID=1234
      - SAMMA_IO_TAGS=['scanner']
      - SAMMA_IO_JSON={}
      - WRITE_TO_FILE=true
      - PARSER=tls-scanner
