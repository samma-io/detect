services:
  whois-scanner:
    build:
      context: ..
      dockerfile: whois-scanner/Dockerfile
    image: ghcr.io/samma-io/detect-whois-scanner:latest
    volumes:
      - ./out:/out
    environment:
      - TARGET=example.com
      - SAMMA_IO_SCANNER=whois-scanner
      - SAMMA_IO_ID=1234
      - SAMMA_IO_TAGS=scanner
      - SAMMA_IO_JSON={}
      - WRITE_TO_FILE=true
      - PARSER=whois-scanner
      - NATS_ENABLED=False
      - NATS_URL=nats://localhost:4222
      - NATS_SUBJECT=samma-io.scan
