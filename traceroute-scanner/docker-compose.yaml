services:
  traceroute-scanner:
    build:
      context: ..
      dockerfile: traceroute-scanner/Dockerfile
    image: ghcr.io/samma-io/detect-traceroute-scanner:latest
    volumes:
      - ./out:/out
    environment:
      - TARGET=scanme.nmap.org
      - MAX_HOPS=30
      - TIMEOUT=2
      - SAMMA_IO_SCANNER=traceroute-scanner
      - SAMMA_IO_ID=1234
      - SAMMA_IO_TAGS=scanner
      - SAMMA_IO_JSON={}
      - WRITE_TO_FILE=true
      - PARSER=traceroute-scanner
      - NATS_ENABLED=False
      - NATS_URL=nats://localhost:4222
      - NATS_SUBJECT=samma-io.scan
